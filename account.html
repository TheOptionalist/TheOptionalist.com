<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Optionalist | Account</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600;700&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="site">
    <header class="site-header" data-menu="closed">
      <div class="brand">
        <h1>The Optionalist</h1>
        <span>Scholarship by Choice</span>
      </div>
    </header>
    <main class="site-main">
      <div class="container">
        <section class="account-shell">
          <div class="account-header">
            <div>
              <p class="account-kicker">My Account</p>
              <h2>Profile Details</h2>
              <p class="account-sub">Your saved program and course details are shown below.</p>
            </div>
            <div class="account-actions">
              <button class="button primary" id="signout">Sign out</button>
            </div>
          </div>

          <div class="account-card">
            <div class="account-row">
              <span>Email</span>
              <strong data-field="email">Loading...</strong>
            </div>
            <div class="account-row">
              <span>Program</span>
              <strong data-field="program">Loading...</strong>
            </div>
            <div class="account-row">
              <span>Course</span>
              <strong data-field="course">Loading...</strong>
            </div>
            <div class="account-row">
              <span>Joined</span>
              <strong data-field="joined">Loading...</strong>
            </div>
          </div>

          <p class="account-note" id="account-note">Syncing your profile...</p>
        </section>
      </div>
    </main>
    <footer class="site-footer">
      <p>2025 The Optionalist. All rights reserved.</p>
    </footer>
  </div>

  <script src="/assets/firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const fields = {
      email: document.querySelector('[data-field="email"]'),
      program: document.querySelector('[data-field="program"]'),
      course: document.querySelector('[data-field="course"]'),
      joined: document.querySelector('[data-field="joined"]')
    };

    const noteEl = document.getElementById("account-note");
    const signOutBtn = document.getElementById("signout");

    const firebaseConfig = window.__FIREBASE_CONFIG__;
    const hasConfig =
      firebaseConfig &&
      firebaseConfig.apiKey &&
      firebaseConfig.authDomain &&
      firebaseConfig.projectId;

    if (!hasConfig) {
      const message = "Firebase config missing. Add /assets/firebase-config.js before using this page.";
      if (noteEl) {
        noteEl.textContent = message;
      }
      throw new Error(message);
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const formatDate = (value) => {
      if (!value) return "-";
      if (typeof value.toDate === "function") {
        return value.toDate().toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
      }
      if (value.seconds) {
        return new Date(value.seconds * 1000).toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
      }
      return "-";
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      fields.email.textContent = user.email || "-";
      fields.joined.textContent = user.metadata?.creationTime
        ? new Date(user.metadata.creationTime).toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
          })
        : "-";

      try {
        const profileSnap = await getDoc(doc(db, "profiles", user.uid));
        if (profileSnap.exists()) {
          const profile = profileSnap.data();
          fields.program.textContent = profile?.program || "-";
          fields.course.textContent = profile?.course || "-";
          fields.joined.textContent = formatDate(profile?.createdAt) || fields.joined.textContent;
        } else {
          fields.program.textContent = "-";
          fields.course.textContent = "-";
        }
        noteEl.textContent = "Profile synced from Firebase.";
      } catch (err) {
        noteEl.textContent = "Could not load profile data.";
      }
    });

    signOutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "/login.html";
    });
  </script>
  <script src="/assets/menu.js" defer></script>
</body>
</html>
